<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Galeria - Minha Roça</title>
  <style>
    body { 
      font-family: Arial; 
      background: #f5f5f5; 
      margin: 0; 
      padding: 20px; 
    }
    h1 { 
      text-align: center; 
      color: #2e7d32; 
    }
    .galeria { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 15px; 
      max-width: 900px; 
      margin: 20px auto; 
    }
    .item { 
      background: white; 
      border-radius: 12px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .item:hover { 
      transform: translateY(-5px); 
    }
    .emoji-box { 
      width: 100%; 
      height: 230px; 
      font-size: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8f5e9;
      border-radius: 12px 12px 0 0;
    }
    .item p { 
      text-align: center; 
      padding: 10px; 
      margin: 0;
      font-weight: bold;
    }
    @media(max-width: 800px) { 
      .galeria { grid-template-columns: repeat(2, 1fr); } 
    }
    @media(max-width: 500px) { 
      .galeria { grid-template-columns: 1fr; } 
    }
  </style>
</head>

  <h1>🌽 Galeria da Minha Roça 🌽</h1>

      <p>Alho</p>
    </div>

    <div class="item">
      <div class="emoji-box">🌶️</div>
      <p>Pimenta</p>
    </div>

      <p>Melancia</p>
